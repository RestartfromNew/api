<!DOCTYPE html>
<html>
<head>
    <title>Auth API Test</title>
    <style>
        body {
            font-family: Arial;
            width: 320px;
            margin: 80px auto;
        }

        input, button {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        .card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

<div class="card">

<h3>Register</h3>

<input id="reg_username" placeholder="Username">
<input id="reg_email" placeholder="Email">
<input id="reg_password" type="password" placeholder="Password">

<button onclick="register1()">Register</button>


<h3>Login</h3>

<input id="login_email" placeholder="Email">
<input id="login_password" type="password" placeholder="Password">

<button onclick="login()">Login</button>


<h3>Search User</h3>

<input id="search_email" placeholder="Search by email">
<input id="search_username" placeholder="Search by username">

<button onclick="searchByEmail()">Search Email</button>
<button onclick="searchByUsername()">Search Username</button>


<h3>Server Response</h3>

<pre id="result"></pre>

</div>


<script>

let accessToken = ""


function showResult(data){
    const result = document.getElementById("result")
    result.innerText = JSON.stringify(data, null, 2)
}


async function register1(){

    const username = document.getElementById("reg_username").value
    const email = document.getElementById("reg_email").value
    const password = document.getElementById("reg_password").value

    const res = await fetch("http://localhost:5001/register",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username:username,
            email:email,
            password:password
        })
    })

    const data = await res.json()

    console.log("register触发")

    showResult(data)
}



async function login(){

    const email = document.getElementById("login_email").value
    const password = document.getElementById("login_password").value

    const res = await fetch("http://localhost:5001/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            email:email,
            password:password
        })
    })

    const data = await res.json()

    accessToken = data.access_token

    console.log("login触发")

    showResult(data)
}



async function searchByEmail(){

    const email = document.getElementById("search_email").value

    const res = await fetch(
        `http://localhost:5001/search_by_id_username_email?email=${encodeURIComponent(email)}`
    )

    const data = await res.json()

    showResult(data)
}



async function searchByUsername(){

    const username = document.getElementById("search_username").value

    const res = await fetch(
        `http://localhost:5001/search_by_id_username_email?username=${encodeURIComponent(username)}`
    )

    const data = await res.json()

    showResult(data)
}


</script>

</body>
</html>
